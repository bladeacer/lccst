<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stopwatch</title>
<style>
body { font-family: monospace; text-align: center; padding: 40px; }
.display { font-size: 48px; margin: 20px; }
button { font-size: 18px; margin: 4px; padding: 8px 20px; }
</style>
</head>
<body>
<h1>Stopwatch</h1>
<div class="display" id="display">00:00.0</div>
<div>
<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>
<button id="resetBtn">Reset</button>
</div>
<script>
let startTime = 0;
let elapsed = 0;
let running = false;
let interval = null;

const display = document.getElementById("display");

function formatTime(ms) {
  const totalSecs = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSecs / 60);
  const seconds = totalSecs % 60;
  const tenths = Math.floor((ms % 1000) / 100);
  return String(minutes).padStart(2, "0") + ":" +
         String(seconds).padStart(2, "0") + "." + tenths;
}

function tick() {
  const now = performance.now();
  elapsed = now - startTime;
  display.textContent = formatTime(elapsed);
}

document.getElementById("startBtn").addEventListener("click", function() {
  if (!running) {
    running = true;
    startTime = performance.now() - elapsed;
    interval = setInterval(tick, 100);
  }
});

document.getElementById("stopBtn").addEventListener("click", function() {
  if (running) {
    running = false;
    clearInterval(interval);
  }
});

document.getElementById("resetBtn").addEventListener("click", function() {
  running = false;
  clearInterval(interval);
  elapsed = 0;
  display.textContent = "00:00.0";
});
</script>
</body>
</html>
